<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>JOJO Clinic | Secure Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    :root {
      --bg-body: #eef2f7;
      --sidebar-bg: linear-gradient(145deg, #0b2b3b 0%, #0a1e2a 100%);
      --sidebar-text: #e0f2fe;
      --sidebar-border: rgba(255,255,255,0.1);
      --card-bg: #ffffff;
      --card-border: #edf2f7;
      --text-primary: #1e293b;
      --text-secondary: #334155;
      --text-muted: #4a6272;
      --input-bg: #ffffff;
      --input-border: #e2edf2;
      --input-focus: #3b9bc0;
      --btn-primary-bg: #176b87;
      --btn-primary-hover: #0e556b;
      --btn-secondary-bg: #e9f0f3;
      --btn-secondary-hover: #dbe9ef;
      --table-border: #eef2f8;
      --badge-bg: #def0f7;
      --topbar-bg: #ffffff;
      --topbar-border: #e2e8f0;
      --placeholder-light: #cbdde6;
      --empty-state: #7b9aaa;
      --login-overlay: rgba(0,0,0,0.3);
    }
    body.dark {
      --bg-body: #0f172a;
      --sidebar-bg: linear-gradient(145deg, #111827 0%, #030712 100%);
      --sidebar-text: #cbd5e6;
      --sidebar-border: rgba(255,255,255,0.05);
      --card-bg: #1e293b;
      --card-border: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e6;
      --text-muted: #94a3b8;
      --input-bg: #0f172a;
      --input-border: #334155;
      --input-focus: #5ee0fa;
      --btn-primary-bg: #2c7f9c;
      --btn-primary-hover: #3b9bc0;
      --btn-secondary-bg: #334155;
      --btn-secondary-hover: #475569;
      --table-border: #334155;
      --badge-bg: #2d4a5f;
      --topbar-bg: #1e293b;
      --topbar-border: #334155;
      --placeholder-light: #475569;
      --empty-state: #94a3b8;
      --login-overlay: rgba(0,0,0,0.7);
    }
    body { background: var(--bg-body); transition: background 0.2s, color 0.2s; color: var(--text-primary); }
    /* Login Screen */
    .login-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--login-overlay); backdrop-filter: blur(6px);
      display: flex; justify-content: center; align-items: center; z-index: 1000;
    }
    .login-card {
      background: var(--card-bg); border-radius: 32px; padding: 40px 32px;
      width: 90%; max-width: 420px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      text-align: center; border: 1px solid var(--card-border);
    }
    .login-card h2 { font-size: 2rem; margin-bottom: 8px; background: linear-gradient(135deg, #176b87, #5bc0de); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .sub { color: var(--text-muted); margin-bottom: 28px; font-size: 0.85rem; }
    .input-group { margin-bottom: 20px; text-align: left; position: relative; }
    .input-group label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.85rem; }
    .input-group input { width: 100%; padding: 12px 16px; border-radius: 28px; border: 1.5px solid var(--input-border); background: var(--input-bg); color: var(--text-primary); font-size: 0.95rem; }
    .password-wrapper { position: relative; display: flex; align-items: center; }
    .password-wrapper input { flex: 1; padding-right: 48px; }
    .toggle-pwd { position: absolute; right: 16px; cursor: pointer; color: var(--text-muted); font-size: 1.1rem; }
    .login-btn { width: 100%; background: var(--btn-primary-bg); border: none; padding: 12px; border-radius: 40px; font-weight: 700; font-size: 1rem; color: white; cursor: pointer; transition: 0.2s; margin-top: 12px; }
    .login-btn:hover { background: var(--btn-primary-hover); transform: translateY(-1px); }
    .error-msg { background: #fecaca; color: #b91c1c; padding: 10px; border-radius: 60px; font-size: 0.8rem; margin-top: 16px; }
    .cred-box {
      margin-top: 20px; background: var(--btn-secondary-bg); border-radius: 24px; padding: 16px;
      text-align: left; font-size: 0.85rem; border-left: 4px solid var(--btn-primary-bg);
    }
    .cred-box strong { color: var(--btn-primary-bg); }
    .cred-row { display: flex; justify-content: space-between; margin: 8px 0; font-family: monospace; }
    /* Main App (hidden until login) */
    #appContainer { display: none; height: 100vh; width: 100%; }
    .app-container { display: flex; height: 100vh; width: 100%; }
    .sidebar { width: 280px; background: var(--sidebar-bg); color: var(--sidebar-text); display: flex; flex-direction: column; box-shadow: 4px 0 20px rgba(0,0,0,0.08); z-index: 10; }
    .logo-area { padding: 32px 24px; border-bottom: 1px solid var(--sidebar-border); margin-bottom: 24px; }
    .logo-area h2 { font-weight: 700; font-size: 1.7rem; background: linear-gradient(135deg, #FFFFFF 0%, #9ec8e0 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .logo-area p { font-size: 0.7rem; opacity: 0.7; display: flex; align-items: center; gap: 6px; }
    .nav-menu { flex: 1; display: flex; flex-direction: column; gap: 8px; padding: 0 16px; }
    .nav-item { display: flex; align-items: center; gap: 14px; padding: 12px 18px; border-radius: 14px; cursor: pointer; transition: all 0.2s; font-weight: 500; color: #cbdbe6; }
    .nav-item i { width: 24px; font-size: 1.2rem; }
    .nav-item.active { background: rgba(80, 180, 210, 0.25); color: white; box-shadow: 0 2px 6px rgba(0,0,0,0.1); backdrop-filter: blur(2px); }
    .nav-item:hover:not(.active) { background: rgba(255, 255, 255, 0.08); color: #f0fcff; }
    .offline-badge { margin-top: auto; padding: 20px 24px; font-size: 0.75rem; border-top: 1px solid var(--sidebar-border); display: flex; align-items: center; gap: 8px; }
    .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; background: var(--bg-body); }
    .top-bar { background: var(--topbar-bg); padding: 16px 28px; border-bottom: 1px solid var(--topbar-border); display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; }
    .clinic-info h1 { font-size: 1.55rem; font-weight: 700; color: var(--text-primary); }
    .clinic-info p { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }
    .action-date { font-size: 0.85rem; background: var(--btn-secondary-bg); padding: 6px 14px; border-radius: 40px; color: var(--text-secondary); }
    .view-container { padding: 28px 32px; max-width: 1400px; width: 100%; margin: 0 auto; }
    .card { background: var(--card-bg); border-radius: 28px; padding: 24px 28px; margin-bottom: 32px; border: 1px solid var(--card-border); }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 24px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    label { font-weight: 600; font-size: 0.85rem; color: var(--text-secondary); }
    input, select, textarea { padding: 12px 14px; border-radius: 18px; border: 1.5px solid var(--input-border); background: var(--input-bg); color: var(--text-primary); font-size: 0.9rem; }
    .radio-group { display: flex; gap: 24px; align-items: center; margin-top: 6px; }
    .btn-group { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 20px; }
    .btn { padding: 10px 24px; border-radius: 40px; font-weight: 600; border: none; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
    .btn-primary { background: var(--btn-primary-bg); color: white; }
    .btn-primary:hover { background: var(--btn-primary-hover); transform: translateY(-1px);}
    .btn-secondary { background: var(--btn-secondary-bg); color: var(--text-primary); }
    .history-table { width: 100%; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 14px 8px; border-bottom: 1px solid var(--table-border); color: var(--text-primary); }
    .badge { background: var(--badge-bg); padding: 4px 12px; border-radius: 30px; font-size: 0.7rem; font-weight: 600; }
    .empty-state { text-align: center; padding: 40px; color: var(--empty-state); }
    .theme-toggle-card { background: var(--card-bg); border-radius: 28px; padding: 20px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; border: 1px solid var(--card-border); }
    .theme-switch { display: flex; gap: 12px; background: var(--btn-secondary-bg); padding: 6px; border-radius: 60px; }
    .theme-option { padding: 8px 24px; border-radius: 40px; cursor: pointer; font-weight: 600; background: transparent; color: var(--text-secondary); }
    .theme-option.active { background: var(--btn-primary-bg); color: white; }
    @media (max-width: 760px) { .sidebar { width: 80px; } .sidebar .logo-area h2, .sidebar .logo-area p span, .nav-item span:last-child, .offline-badge span { display: none; } .nav-item i { margin: 0 auto; } .view-container { padding: 20px; } }
  </style>
</head>
<body>
<div id="loginScreen" class="login-container">
  <div class="login-card">
    <h2><i class="fas fa-clinic-medical"></i> JOJO Clinic</h2>
    <div class="sub">Secure access · Patient management</div>
    <!-- Explicitly display credentials -->
    <div class="cred-box">
      <i class="fas fa-key"></i> <strong>Login Credentials</strong>
      <div class="cred-row"><span>👤 Username:</span> <code style="background:var(--input-bg); padding:2px 8px; border-radius:20px;">jojo</code></div>
      <div class="cred-row"><span>🔒 Password:</span> <code style="background:var(--input-bg); padding:2px 8px; border-radius:20px;">clinic2026</code></div>
    </div>
    <div class="input-group">
      <label>Username</label>
      <input type="text" id="loginUsername" placeholder="Enter username" autocomplete="off" value="jojo">
    </div>
    <div class="input-group">
      <label>Password</label>
      <div class="password-wrapper">
        <input type="password" id="loginPassword" placeholder="Enter password" value="clinic2026">
        <i class="fas fa-eye toggle-pwd" id="togglePwdIcon"></i>
      </div>
    </div>
    <button class="login-btn" id="doLoginBtn"><i class="fas fa-key"></i> Sign In</button>
    <div id="loginError" style="min-height: 48px;"></div>
  </div>
</div>

<div id="appContainer">
  <div class="app-container">
    <div class="sidebar">
      <div class="logo-area"><h2>🩺 JOJO</h2><p><i class="fas fa-leaf"></i> <span>Gentle care • Offline ready</span></p></div>
      <div class="nav-menu">
        <div class="nav-item" data-view="dashboard"><i class="fas fa-chart-line"></i><span>Dashboard</span></div>
        <div class="nav-item active" data-view="checkin"><i class="fas fa-user-plus"></i><span>Patient Check-in</span></div>
        <div class="nav-item" data-view="appointments"><i class="fas fa-calendar-check"></i><span>Appointments</span></div>
        <div class="nav-item" data-view="history"><i class="fas fa-history"></i><span>History</span></div>
        <div class="nav-item" data-view="setting"><i class="fas fa-sliders-h"></i><span>Setting</span></div>
        <div class="nav-item" data-view="logout"><i class="fas fa-sign-out-alt"></i><span>Logout</span></div>
      </div>
      <div class="offline-badge"><i class="fas fa-database"></i> <span>LocalStorage • persists offline</span></div>
    </div>
    <div class="main-content">
      <div class="top-bar">
        <div class="clinic-info"><h1 id="clinicNameDisplay">JOJO HEALTH CLINIC</h1><p id="clinicContactDisplay">+250 799376383 | Kamonyi Health Center</p></div>
        <div class="action-date"><i class="far fa-calendar-alt"></i> <span id="currentDate"></span></div>
      </div>
      <div id="viewRoot" class="view-container"></div>
    </div>
  </div>
</div>

<script>
  // Auth state
  let isLoggedIn = false;
  const VALID_USERNAME = "jojo";
  const VALID_PASSWORD = "clinic2026";

  // Data models
  let patients = [];
  let appointments = [];
  let clinicSettings = { clinicName: "JOJO HEALTH CLINIC", phone: "+250 799376383", address: "Kamonyi Health Center" };
  let currentTheme = "light";
  let currentView = "checkin";

  // Helper functions
  function loadData() {
    patients = JSON.parse(localStorage.getItem("jojo_patients") || "[]");
    appointments = JSON.parse(localStorage.getItem("jojo_appointments") || "[]");
    const storedSettings = localStorage.getItem("jojo_settings");
    if (storedSettings) clinicSettings = JSON.parse(storedSettings);
    else saveSettings();
    const storedTheme = localStorage.getItem("jojo_theme");
    if (storedTheme === "dark") { currentTheme = "dark"; document.body.classList.add("dark"); }
    else { currentTheme = "light"; document.body.classList.remove("dark"); }
  }
  function savePatients() { localStorage.setItem("jojo_patients", JSON.stringify(patients)); }
  function saveAppointments() { localStorage.setItem("jojo_appointments", JSON.stringify(appointments)); }
  function saveSettings() { localStorage.setItem("jojo_settings", JSON.stringify(clinicSettings)); updateTopBarClinicInfo(); }
  function saveTheme() { localStorage.setItem("jojo_theme", currentTheme); }
  function updateTopBarClinicInfo() {
    const nameEl = document.getElementById("clinicNameDisplay");
    const contactEl = document.getElementById("clinicContactDisplay");
    if (nameEl) nameEl.innerText = clinicSettings.clinicName;
    if (contactEl) contactEl.innerText = `${clinicSettings.phone} | ${clinicSettings.address}`;
  }
  function formatDate() { return new Date().toLocaleDateString('en-GB', { weekday: 'short', year:'numeric', month:'short', day:'numeric' }); }
  document.getElementById("currentDate") && (document.getElementById("currentDate").innerText = formatDate());

  function setTheme(theme) { currentTheme = theme; if (theme === "dark") document.body.classList.add("dark"); else document.body.classList.remove("dark"); saveTheme(); renderView(); }

  // Rendering (compact and complete)
  function renderView() {
    const root = document.getElementById("viewRoot");
    if (!root) return;
    if (currentView === "dashboard") root.innerHTML = renderDashboard();
    else if (currentView === "checkin") root.innerHTML = renderCheckinView();
    else if (currentView === "appointments") root.innerHTML = renderAppointmentsView();
    else if (currentView === "history") root.innerHTML = renderHistoryView();
    else if (currentView === "setting") root.innerHTML = renderSettingView();
    else if (currentView === "logout") { logout(); return; }
    attachViewEvents();
  }

  function renderDashboard() {
    const totalPatients = patients.length, totalAppointments = appointments.length;
    const recent = [...patients].sort((a,b)=>b.timestamp - a.timestamp).slice(0,5);
    return `<div class="card"><h2><i class="fas fa-chart-pie"></i> Clinic Dashboard</h2><div style="display:flex;gap:20px;flex-wrap:wrap;margin-bottom:32px;"><div style="background:var(--btn-secondary-bg);padding:20px;border-radius:28px;flex:1;text-align:center"><i class="fas fa-users" style="font-size:2rem;color:var(--btn-primary-bg);"></i><h3>${totalPatients}</h3><p>Total Check-ins</p></div><div style="background:var(--btn-secondary-bg);padding:20px;border-radius:28px;flex:1;text-align:center"><i class="fas fa-calendar-week" style="font-size:2rem;color:var(--btn-primary-bg);"></i><h3>${totalAppointments}</h3><p>Appointments</p></div></div><h3>📋 Recent Patients</h3>${recent.length===0?'<div class="empty-state">No recent check-ins</div>':`<div class="history-table"><table><thead><tr><th>Name</th><th>Type</th><th>Date</th></tr></thead><tbody>${recent.map(p=>`<tr><td><strong>${escapeHtml(p.fullName)}</strong></td><td><span class="badge">${p.patientType}</span></td><td>${new Date(p.timestamp).toLocaleString()}</td></tr>`).join('')}</tbody></table></div>`}</div>`;
  }
  function renderCheckinView() {
    const sorted = [...patients].sort((a,b)=>b.timestamp - a.timestamp);
    return `<div class="card"><h3><i class="fas fa-notes-medical"></i> Patient Check-in Form</h3><div class="form-grid"><div class="form-group"><label>Full Name</label><input type="text" id="fullName" placeholder="e.g., Jojo Mutesi"></div><div class="form-group"><label>Gender</label><div class="radio-group"><label><input type="radio" name="gender" value="Female"> Female</label><label><input type="radio" name="gender" value="Male"> Male</label></div></div><div class="form-group"><label>Age (Years)</label><input type="number" id="age" placeholder="Years"></div><div class="form-group"><label>Contact</label><input type="tel" id="contact" placeholder="Phone number"></div><div class="form-group"><label>Patient Type</label><div class="radio-group"><label><input type="radio" name="patientType" value="New Patient"> New Patient</label><label><input type="radio" name="patientType" value="Returning Patient"> Returning Patient</label></div></div><div class="form-group"><label>Symptoms / Notes</label><textarea id="symptoms" rows="2" placeholder="fever, cough, check-up..."></textarea></div></div><div class="btn-group"><button class="btn btn-primary" id="submitPatientBtn"><i class="fas fa-save"></i> Submit patient</button><button class="btn btn-secondary" id="clearFormBtn"><i class="fas fa-eraser"></i> Clear form</button><button class="btn btn-outline" id="printReceiptBtn"><i class="fas fa-print"></i> Print receipt</button></div></div><div class="card"><h3><i class="fas fa-list-ul"></i> Patient History Tracking</h3>${sorted.length===0?'<div class="empty-state">🚑 No patients checked in yet.</div>':`<div class="history-table"><table><thead><tr><th>Name</th><th>Gender/Age</th><th>Contact</th><th>Type</th><th>Symptoms</th><th>Time</th></tr></thead><tbody>${sorted.map(p=>`<tr><td><strong>${escapeHtml(p.fullName)}</strong></td><td>${p.gender}/${p.age}</td><td>${escapeHtml(p.contact)}</td><td><span class="badge">${p.patientType}</span></td><td>${escapeHtml(p.symptoms.substring(0,40))}</td><td>${new Date(p.timestamp).toLocaleTimeString()}</td></tr>`).join('')}</tbody></table></div>`}</div>`;
  }
  function renderAppointmentsView() {
    return `<div class="card"><h3><i class="fas fa-plus-circle"></i> Schedule New Appointment</h3><div class="form-grid"><div class="form-group"><label>Patient Name</label><input type="text" id="appPatientName" placeholder="Full name"></div><div class="form-group"><label>Appointment Date</label><input type="datetime-local" id="appDate"></div><div class="form-group"><label>Reason</label><input type="text" id="appReason" placeholder="Check-up / Consultation"></div></div><div class="btn-group"><button class="btn btn-primary" id="addAppointmentBtn"><i class="fas fa-calendar-plus"></i> Add Appointment</button></div></div><div class="card"><h3><i class="fas fa-calendar-alt"></i> Upcoming Appointments</h3>${appointments.length===0?'<div class="empty-state">No appointments scheduled</div>':`<div class="history-table"><table><thead><tr><th>Patient</th><th>Date & Time</th><th>Reason</th><th>Action</th></tr></thead><tbody>${appointments.map(app=>`<tr><td>${escapeHtml(app.patientName)}</td><td>${escapeHtml(app.date)}</td><td>${escapeHtml(app.reason)}</td><td><button class="btn btn-secondary" style="padding:4px 12px;" data-delapp="${app.id}"><i class="fas fa-trash-alt"></i> Cancel</button></td></tr>`).join('')}</tbody></table></div>`}</div>`;
  }
  function renderHistoryView() {
    const sortedAll = [...patients].sort((a,b)=>b.timestamp - a.timestamp);
    return `<div class="card"><h3><i class="fas fa-archive"></i> Complete Patient History</h3><input type="text" id="historySearchInput" placeholder="🔍 Search by name, contact..." style="width:100%; margin-bottom:24px;"><div id="historyListContainer">${renderHistoryTable(sortedAll)}</div></div>`;
  }
  function renderHistoryTable(arr) {
    if (!arr.length) return '<div class="empty-state">📭 No records found</div>';
    return `<div class="history-table"><table><thead><tr><th>Name</th><th>Gender/Age</th><th>Contact</th><th>Type</th><th>Symptoms</th><th>Check-in Time</th><th></th></tr></thead><tbody>${arr.map(p=>`<tr><td><strong>${escapeHtml(p.fullName)}</strong></td><td>${p.gender}/${p.age}</td><td>${escapeHtml(p.contact)}</td><td>${p.patientType}</td><td>${escapeHtml(p.symptoms.substring(0,50))}</td><td>${new Date(p.timestamp).toLocaleString()}</td><td><button class="btn btn-secondary" style="padding:4px 14px;" data-del="${p.id}"><i class="fas fa-trash"></i> Delete</button></td></tr>`).join('')}</tbody></table></div>`;
  }
  function renderSettingView() {
    return `<div class="theme-toggle-card"><div><i class="fas fa-palette"></i> <strong>Color Theme</strong><br><span style="font-size:0.75rem;">Switch between White (Light) and Black (Dark) mode</span></div><div class="theme-switch" id="themeSwitch"><div class="theme-option ${currentTheme === 'light' ? 'active' : ''}" data-theme="light"><i class="fas fa-sun"></i> White</div><div class="theme-option ${currentTheme === 'dark' ? 'active' : ''}" data-theme="dark"><i class="fas fa-moon"></i> Black</div></div></div><div class="card"><h3><i class="fas fa-sliders-h"></i> Clinic Settings (Offline ready)</h3><div class="form-grid"><div class="form-group"><label>Clinic Name</label><input type="text" id="setClinicName" value="${escapeHtml(clinicSettings.clinicName)}"></div><div class="form-group"><label>Phone Number</label><input type="text" id="setPhone" value="${escapeHtml(clinicSettings.phone)}"></div><div class="form-group"><label>Address</label><input type="text" id="setAddress" value="${escapeHtml(clinicSettings.address)}"></div></div><div class="btn-group"><button class="btn btn-primary" id="saveSettingsBtn"><i class="fas fa-save"></i> Save Settings</button><button class="btn btn-outline" id="resetDataBtn"><i class="fas fa-trash-restore"></i> Reset All Data</button></div><div style="margin-top:30px; background:var(--btn-secondary-bg); border-radius:24px; padding:16px;"><i class="fas fa-info-circle"></i> All data stored locally. Works offline.</div></div>`;
  }

  function attachViewEvents() {
    if (currentView === "checkin") {
      document.getElementById("submitPatientBtn")?.addEventListener("click", handleSubmitPatient);
      document.getElementById("clearFormBtn")?.addEventListener("click", clearCheckinForm);
      document.getElementById("printReceiptBtn")?.addEventListener("click", printReceipt);
    }
    if (currentView === "appointments") {
      document.getElementById("addAppointmentBtn")?.addEventListener("click", addAppointment);
      document.querySelectorAll("[data-delapp]").forEach(btn => btn.addEventListener("click", (e) => deleteAppointment(btn.getAttribute("data-delapp"))));
    }
    if (currentView === "history") {
      const search = document.getElementById("historySearchInput");
      if (search) search.addEventListener("input", (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = patients.filter(p => p.fullName.toLowerCase().includes(term) || p.contact.includes(term));
        document.getElementById("historyListContainer").innerHTML = renderHistoryTable(filtered);
        attachDeleteEventsInHistory();
      });
      attachDeleteEventsInHistory();
    }
    if (currentView === "setting") {
      document.querySelectorAll(".theme-option").forEach(opt => opt.addEventListener("click", () => { setTheme(opt.getAttribute("data-theme")); renderView(); }));
      document.getElementById("saveSettingsBtn")?.addEventListener("click", () => {
        clinicSettings.clinicName = document.getElementById("setClinicName").value;
        clinicSettings.phone = document.getElementById("setPhone").value;
        clinicSettings.address = document.getElementById("setAddress").value;
        saveSettings(); alert("✅ Settings saved!"); renderView();
      });
      document.getElementById("resetDataBtn")?.addEventListener("click", () => { if(confirm("Delete ALL data?")){ patients=[]; appointments=[]; savePatients(); saveAppointments(); alert("Reset done."); renderView(); } });
    }
  }
  function attachDeleteEventsInHistory() { document.querySelectorAll("[data-del]").forEach(btn => btn.addEventListener("click", () => { if(confirm("Delete patient?")){ patients=patients.filter(p=>p.id!==btn.getAttribute("data-del")); savePatients(); renderView(); } })); }
  function handleSubmitPatient() {
    const fullName = document.getElementById("fullName")?.value.trim();
    const genderElem = document.querySelector('input[name="gender"]:checked');
    const age = document.getElementById("age")?.value;
    const contact = document.getElementById("contact")?.value.trim();
    const patientTypeElem = document.querySelector('input[name="patientType"]:checked');
    const symptoms = document.getElementById("symptoms")?.value.trim();
    if (!fullName || !genderElem || !age || age<=0 || !contact || !patientTypeElem) { alert("Please fill all required fields."); return; }
    patients.unshift({ id: Date.now().toString(), fullName, gender: genderElem.value, age: parseInt(age), contact, patientType: patientTypeElem.value, symptoms: symptoms||"No notes", timestamp: Date.now() });
    savePatients(); clearCheckinForm(); renderView(); alert(`✅ ${fullName} checked-in!`);
  }
  function clearCheckinForm() { ["fullName","age","contact"].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=""; }); document.getElementById("symptoms") && (document.getElementById("symptoms").value=""); document.querySelectorAll('input[name="gender"]').forEach(r=>r.checked=false); document.querySelectorAll('input[name="patientType"]').forEach(r=>r.checked=false); }
  function printReceipt() { const win=window.open(); win.document.write(`<div style="padding:20px;"><h2>${clinicSettings.clinicName}</h2><p>${clinicSettings.phone}<br>Receipt: ${new Date().toLocaleString()}</p><p>Patient: ${document.getElementById("fullName")?.value||"___"}</p><hr/><p>Thank you</p></div>`); win.document.close(); win.print(); }
  function addAppointment() { const name=document.getElementById("appPatientName")?.value.trim(), date=document.getElementById("appDate")?.value, reason=document.getElementById("appReason")?.value.trim(); if(!name||!date||!reason) { alert("Fill all fields"); return; } appointments.push({id:Date.now().toString(), patientName:name, date:date.replace("T"," "), reason }); saveAppointments(); renderView(); alert("Appointment added."); }
  function deleteAppointment(id) { appointments = appointments.filter(a=>a.id!==id); saveAppointments(); renderView(); }
  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=> ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

  function setActiveView(viewId) { currentView = viewId; document.querySelectorAll(".nav-item").forEach(item=>{ if(item.getAttribute("data-view")===viewId) item.classList.add("active"); else item.classList.remove("active"); }); renderView(); }
  document.querySelectorAll(".nav-item").forEach(item=>{ item.addEventListener("click",()=>{ setActiveView(item.getAttribute("data-view")); }); });

  // Authentication logic
  function login(username, password) {
    if (username === VALID_USERNAME && password === VALID_PASSWORD) {
      isLoggedIn = true;
      sessionStorage.setItem("jojo_auth", "true");
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("appContainer").style.display = "block";
      loadData();
      updateTopBarClinicInfo();
      setActiveView("checkin");
      return true;
    } else {
      document.getElementById("loginError").innerHTML = '<div class="error-msg"><i class="fas fa-exclamation-triangle"></i> Invalid credentials. Use jojo / clinic2026</div>';
      return false;
    }
  }
  function logout() {
    isLoggedIn = false;
    sessionStorage.removeItem("jojo_auth");
    document.getElementById("loginScreen").style.display = "flex";
    document.getElementById("appContainer").style.display = "none";
  }
  function checkAuth() {
    if (sessionStorage.getItem("jojo_auth") === "true") {
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("appContainer").style.display = "block";
      loadData();
      updateTopBarClinicInfo();
      setActiveView("checkin");
    } else {
      document.getElementById("loginScreen").style.display = "flex";
      document.getElementById("appContainer").style.display = "none";
    }
  }
  document.getElementById("doLoginBtn")?.addEventListener("click", () => {
    const user = document.getElementById("loginUsername").value.trim();
    const pwd = document.getElementById("loginPassword").value;
    login(user, pwd);
  });
  // Toggle password visibility
  const togglePwd = document.getElementById("togglePwdIcon");
  const pwdInput = document.getElementById("loginPassword");
  if (togglePwd && pwdInput) {
    togglePwd.addEventListener("click", () => {
      const type = pwdInput.getAttribute("type") === "password" ? "text" : "password";
      pwdInput.setAttribute("type", type);
      togglePwd.classList.toggle("fa-eye-slash");
    });
  }
  document.getElementById("loginPassword")?.addEventListener("keypress", (e) => { if(e.key === "Enter") document.getElementById("doLoginBtn").click(); });
  checkAuth();
</script>
</body>
</html>
